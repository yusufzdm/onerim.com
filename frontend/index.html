<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>önerim.com - Laptop Öneri Asistanı</title>
  </head>
  <body>
    <!-- FOUC onleme: Vue mount olmadan once tema tercihini uygula -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.body.classList.add('dark-mode');
        }
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
